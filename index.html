<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>💌Daily Paragraph💌</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Noto+Serif:ital,wght@0,700;1,400&display=swap" rel="stylesheet" />

  <style>
    :root {
      --bg:        #F2F2F7;
      --card:      #FFFFFF;
      --card2:     #F9F9FB;
      --border:    #E5E5EA;
      --sep:       #E5E5EA;
      --text:      #1C1C1E;
      --sub:       #6C6C70;
      --muted:     #AEAEB2;
      --blue:      #007AFF;
      --blue-soft: #EAF2FF;
      --green:     #34C759;
      --orange:    #FF9500;
      --red:       #FF3B30;
      --purple:    #AF52DE;
      --tag-blue:  #E3EFFF;
      --tag-green: #E3F9E8;
      --tag-orange:#FFF3E0;
      --tag-purple:#F5EEFF;
      --radius:    16px;
      --radius-sm: 12px;
      --shadow:    0 2px 12px rgba(0,0,0,0.07);
      --shadow-lg: 0 8px 30px rgba(0,0,0,0.10);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Nunito', -apple-system, sans-serif;
      min-height: 100vh;
      padding-bottom: env(safe-area-inset-bottom, 24px);
      -webkit-font-smoothing: antialiased;
    }

    .header {
      background: rgba(242,242,247,0.85);
      backdrop-filter: saturate(180%) blur(20px);
      -webkit-backdrop-filter: saturate(180%) blur(20px);
      padding: 54px 20px 14px;
      position: sticky;
      top: 0;
      z-index: 100;
      border-bottom: 1px solid var(--border);
    }
    .header-inner {
      max-width: 640px;
      margin: 0 auto;
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
    }
    .header-title {
      font-family: 'Noto Serif', serif;
      font-weight: 700;
      font-size: 1.65rem;
      color: var(--text);
      letter-spacing: -0.5px;
    }
    .header-count {
      font-size: 0.78rem;
      font-weight: 600;
      color: var(--muted);
      margin-bottom: 3px;
    }

    #list-view { max-width: 640px; margin: 0 auto; padding: 18px 16px 0; }

    .card {
      background: var(--card);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      margin-bottom: 14px;
      overflow: hidden;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .card:active { transform: scale(0.975); box-shadow: none; }

    .card-top {
      padding: 16px 18px 12px;
      display: flex;
      align-items: flex-start;
      gap: 12px;
    }
    .card-emoji-wrap {
      width: 46px; height: 46px;
      border-radius: 12px;
      background: var(--blue-soft);
      display: flex; align-items: center; justify-content: center;
      font-size: 1.4rem;
      flex-shrink: 0;
    }
    .card-info { flex: 1; }
    .card-tag {
      display: inline-block;
      font-size: 0.62rem;
      font-weight: 700;
      letter-spacing: 0.8px;
      text-transform: uppercase;
      border-radius: 5px;
      padding: 2px 7px;
      margin-bottom: 5px;
    }
    .tag-blue   { background: var(--tag-blue);   color: var(--blue); }
    .tag-green  { background: var(--tag-green);  color: var(--green); }
    .tag-orange { background: var(--tag-orange); color: var(--orange); }
    .tag-purple { background: var(--tag-purple); color: var(--purple); }

    .card-title {
      font-family: 'Noto Serif', serif;
      font-size: 0.98rem;
      font-weight: 700;
      color: var(--text);
      line-height: 1.35;
    }
    .card-chevron {
      color: var(--muted);
      font-size: 1.1rem;
      font-weight: 600;
      margin-top: 12px;
      flex-shrink: 0;
    }

    .card-preview {
      padding: 0 18px 14px;
      font-size: 0.83rem;
      color: var(--sub);
      line-height: 1.6;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .card-footer {
      border-top: 1px solid var(--sep);
      padding: 9px 18px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .word-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--blue);
      flex-shrink: 0;
    }
    .card-word-count {
      font-size: 0.73rem;
      font-weight: 600;
      color: var(--sub);
    }

    #detail-view {
      display: none;
      max-width: 640px;
      margin: 0 auto;
      animation: fadeUp 0.22s ease;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .detail-topbar {
      background: rgba(242,242,247,0.85);
      backdrop-filter: saturate(180%) blur(20px);
      -webkit-backdrop-filter: saturate(180%) blur(20px);
      border-bottom: 1px solid var(--border);
      padding: 54px 16px 12px;
      position: sticky;
      top: 0;
      z-index: 10;
      display: flex;
      align-items: center;
    }
    .back-btn {
      background: none;
      border: none;
      color: var(--blue);
      font-family: 'Nunito', sans-serif;
      font-size: 0.95rem;
      font-weight: 700;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 4px 0;
      -webkit-tap-highlight-color: transparent;
    }

    .detail-body { padding: 20px 16px 0; }

    .hero-widget {
      background: var(--card);
      border-radius: 20px;
      box-shadow: var(--shadow-lg);
      padding: 22px 22px 20px;
      margin-bottom: 16px;
    }
    .hero-top {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 14px;
    }
    .hero-emoji-wrap {
      width: 44px; height: 44px;
      border-radius: 12px;
      background: var(--blue-soft);
      display: flex; align-items: center; justify-content: center;
      font-size: 1.35rem;
    }
    .hero-label {
      font-size: 0.65rem;
      font-weight: 800;
      letter-spacing: 1.2px;
      text-transform: uppercase;
      color: var(--blue);
    }
    .hero-title {
      font-family: 'Noto Serif', serif;
      font-size: 1.15rem;
      font-weight: 700;
      line-height: 1.35;
      color: var(--text);
    }
    
    .hero-divider { height: 1px; background: var(--sep); margin: 16px 0; }

    /* 🔥 수정된 부분: 고정된 문장 해석 박스 */
    .translation-box {
      background: var(--tag-blue);
      color: var(--blue);
      border: 1px dashed #BFDBFE;
      border-radius: var(--radius-sm);
      padding: 14px 18px;
      margin-bottom: 18px;
      font-size: 0.95rem;
      font-weight: 700;
      line-height: 1.5;
      text-align: center;
      transition: all 0.2s ease;
    }
    
    /* 사용자가 문장을 클릭해서 해석이 들어왔을 때의 스타일 */
    .translation-box.has-content {
      background: var(--card2);
      color: var(--text);
      border: 1px solid var(--border);
      text-align: left;
    }

    .para-text {
      font-size: 0.95rem;
      line-height: 1.85;
      color: var(--text);
    }

    /* 문장 터치 및 활성화 스타일 */
    .tap-sentence {
      cursor: pointer;
      border-radius: 4px;
      transition: background 0.2s, color 0.2s;
      -webkit-tap-highlight-color: transparent;
      padding: 2px 0;
    }
    .tap-sentence.active-sentence {
      background: var(--blue-soft);
      color: var(--blue);
    }

    /* 단어는 밑줄만 남김 */
    .tap-word {
      border-bottom: 1.5px solid #BFDBFE;
      color: inherit;
      border-radius: 3px;
      padding: 0 1px;
    }

    .words-widget {
      background: var(--card);
      border-radius: 20px;
      box-shadow: var(--shadow);
      overflow: hidden;
      margin-bottom: 32px;
    }
    .words-widget-header {
      padding: 14px 18px 10px;
      display: flex;
      align-items: center;
      gap: 8px;
      border-bottom: 1px solid var(--sep);
    }
    .words-widget-icon {
      width: 28px; height: 28px;
      border-radius: 7px;
      background: var(--tag-green);
      display: flex; align-items: center; justify-content: center;
      font-size: 0.9rem;
    }
    .words-widget-title {
      font-size: 0.82rem;
      font-weight: 800;
      color: var(--text);
    }
    .words-widget-count {
      margin-left: auto;
      font-size: 0.75rem;
      font-weight: 700;
      color: var(--muted);
    }

    .word-row {
      display: flex;
      align-items: center;
      padding: 12px 18px;
      border-bottom: 1px solid var(--sep);
      gap: 10px;
    }
    .word-row:last-child { border-bottom: none; }
    .word-en {
      font-size: 0.9rem;
      font-weight: 700;
      color: var(--text);
      min-width: 100px;
    }
    .word-pos-pill {
      font-size: 0.58rem;
      font-weight: 800;
      letter-spacing: 0.8px;
      text-transform: uppercase;
      border-radius: 5px;
      padding: 2px 6px;
      white-space: nowrap;
    }
    .pos-verb   { background: var(--tag-orange); color: var(--orange); }
    .pos-noun   { background: var(--tag-blue);   color: var(--blue); }
    .pos-adverb { background: var(--tag-purple); color: var(--purple); }
    .pos-adj    { background: var(--tag-green);  color: var(--green); }
    .pos-other  { background: #F2F2F7; color: var(--sub); }

    .word-kr {
      font-size: 0.83rem;
      color: var(--sub);
      font-weight: 600;
      margin-left: auto;
      text-align: right;
    }

    .empty-notice {
      text-align: center;
      color: var(--muted);
      font-size: 0.9rem;
      font-weight: 600;
      padding: 48px 0;
    }
  </style>
</head>
<body>

<div id="list-view">
  <div class="header">
    <div class="header-inner">
      <div class="header-title">Daily Paragraph</div>
      <div class="header-count" id="count-label"></div>
    </div>
  </div>
  <div style="max-width:640px;margin:0 auto;padding:18px 16px 0;">
    <div id="cards-container"></div>
  </div>
</div>

<div id="detail-view">
  <div class="detail-topbar">
    <button class="back-btn" onclick="showList()">‹ 목록</button>
  </div>
  <div class="detail-body">

    <div class="hero-widget">
      <div class="hero-top">
        <div class="hero-emoji-wrap" id="d-emoji-wrap"></div>
        <div>
          <div class="hero-label" id="d-label">Today's Paragraph</div>
          <div style="font-size:0.65rem;font-weight:600;color:var(--muted)" id="d-date"></div>
        </div>
      </div>
      <div class="hero-title" id="d-title"></div>
      <div class="hero-divider"></div>

      <div class="translation-box" id="translation-box">💡 문장을 클릭하면 이곳에 해석이 나타납니다.</div>

      <div class="para-text" id="d-paragraph"></div>
    </div>

    <div class="words-widget" id="words-widget" style="display:none;">
      <div class="words-widget-header">
        <div class="words-widget-icon">📚</div>
        <div class="words-widget-title">단어 목록</div>
        <div class="words-widget-count" id="words-count"></div>
      </div>
      <div id="d-wordlist"></div>
    </div>

  </div>
</div>

<script>
  let data = { paragraphs: [] };
  let currentItem = null;
  let activeSentenceEl = null;

  const TAG_COLORS = ['tag-blue','tag-green','tag-orange','tag-purple'];
  function tagColor(cat) {
    if (!cat) return 'tag-blue';
    const map = { etymology:'tag-orange', grammar:'tag-green', idiom:'tag-purple', vocabulary:'tag-blue' };
    return map[cat.toLowerCase()] || TAG_COLORS[cat.charCodeAt(0) % 4];
  }
  function posClass(pos) {
    const m = { verb:'pos-verb', noun:'pos-noun', adverb:'pos-adverb', adjective:'pos-adj', adj:'pos-adj' };
    return m[(pos||'').toLowerCase()] || 'pos-other';
  }

  async function loadData() {
    try {
      const resp = await fetch('paragraphs.json');
      data = await resp.json();
    } catch {
      data = { paragraphs: [] };
    }
    renderList();
  }

  let filteredList = [];

  function renderList() {
    const c = document.getElementById('cards-container');
    const now = new Date();
    const today = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')}`;
    filteredList = data.paragraphs
      .filter(item => !item.date || item.date <= today)
      .sort((a, b) => (b.date || '').localeCompare(a.date || ''));
    const list = filteredList;
    document.getElementById('count-label').textContent = list.length + '개';
    if (!list.length) {
      c.innerHTML = '<div class="empty-notice">아직 글이 없어요 🌱</div>';
      return;
    }
    c.innerHTML = list.map((item, i) => `
      <div class="card" onclick="showDetail(${i})">
        <div class="card-top">
          <div class="card-emoji-wrap">${item.emoji || '📖'}</div>
          <div class="card-info">
            <span class="card-tag ${tagColor(item.category)}">${item.category || 'English'}</span>
            <div class="card-title">${item.title}</div>
          </div>
          <div class="card-chevron">›</div>
        </div>
        <div class="card-preview">${item.text}</div>
        ${item.words && item.words.length ? `
        <div class="card-footer">
          <div class="word-dot"></div>
          <div class="card-word-count">단어 ${item.words.length}개</div>
        </div>` : ''}
      </div>
    `).join('');
  }

  function showDetail(index) {
    currentItem = filteredList[index];
    const item = currentItem;

    document.getElementById('d-emoji-wrap').textContent = item.emoji || '📖';
    document.getElementById('d-label').textContent = (item.category || 'English').toUpperCase();
    document.getElementById('d-date').textContent = item.date || '';
    document.getElementById('d-title').textContent = item.title;

    const wordMap = {};
    (item.words || []).forEach(w => { wordMap[w.word.toLowerCase()] = w; });
    
    // 문장 분리 로직 (따옴표 포함)
    const sentences = (item.text.match(/.*?[.!?]+["']?(?=\s|$)/g) || [item.text]).map(s => s.trim());
    
    const html = sentences.map((sentence, sIdx) => {
      const tokens = sentence.split(/(\s+)/);
      const sentenceHtml = tokens.map(tok => {
        const clean = tok.replace(/[^a-zA-Z']/g,'').toLowerCase();
        if (wordMap[clean]) {
          return `<span class="tap-word">${tok}</span>`;
        }
        return tok;
      }).join('');
      
      return `<span class="tap-sentence" onclick="showTranslation(this, ${sIdx})">${sentenceHtml}</span>`;
    }).join(' ');

    document.getElementById('d-paragraph').innerHTML = html;
    
    // 🔥 번역 박스 초기화
    const tBox = document.getElementById('translation-box');
    tBox.textContent = "💡 문장을 클릭하면 이곳에 해석이 나타납니다.";
    tBox.classList.remove('has-content');

    const ww = document.getElementById('words-widget');
    const wl = document.getElementById('d-wordlist');
    if (item.words && item.words.length) {
      ww.style.display = 'block';
      document.getElementById('words-count').textContent = item.words.length + '개';
      wl.innerHTML = item.words.map(w => `
        <div class="word-row">
          <span class="word-en">${w.word}</span>
          <span class="word-pos-pill ${posClass(w.pos)}">${w.pos}</span>
          <span class="word-kr">${w.meaning}</span>
        </div>
      `).join('');
    } else {
      ww.style.display = 'none';
    }

    document.getElementById('list-view').style.display = 'none';
    document.getElementById('detail-view').style.display = 'block';
    window.scrollTo(0, 0);
  }

  // 🔥 수정된 번역 표시 함수
  function showTranslation(el, sIdx) {
    if (activeSentenceEl) {
      activeSentenceEl.classList.remove('active-sentence');
    }
    activeSentenceEl = el;
    el.classList.add('active-sentence');

    const translations = currentItem.translations || [];
    const koText = translations[sIdx] || "이 문장의 해석이 제공되지 않았습니다.";

    const tBox = document.getElementById('translation-box');
    tBox.textContent = koText;
    tBox.classList.add('has-content'); // 배경색, 정렬 등 스타일 변경
  }

  function showList() {
    document.getElementById('detail-view').style.display = 'none';
    document.getElementById('list-view').style.display = 'block';
    window.scrollTo(0, 0);
    
    if (activeSentenceEl) { 
      activeSentenceEl.classList.remove('active-sentence'); 
      activeSentenceEl = null; 
    }
  }

  loadData();
</script>
</body>
</html>
